name: Deploy Site to EC2

on:
  pull_request:


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,value=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    permissions:
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Local Docker Compose
        run: |
          # Create deployment directory if it doesn't exist
          mkdir -p /home/ubuntu/sigmabuilder/site
          
          # Copy docker-compose.yml to the deployment folder
          cp docker-compose.yml /home/ubuntu/sigmabuilder/site/
          
          # Authenticate Docker daemon on EC2 to GitHub Packages using workflow GITHUB_TOKEN
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Navigate to deployment directory, pull the latest public site image, and update container
          cd /home/ubuntu/sigmabuilder/site
          docker compose pull
          docker compose up -d --remove-orphans



